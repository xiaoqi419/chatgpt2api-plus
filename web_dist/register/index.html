<!DOCTYPE html>
<html lang="zh-CN" suppressHydrationWarning>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>注册管理 - ChatGPT 号池管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: { colors: { stone: { 900: '#1c1917', 800: '#292524', 700: '#44403c', 600: '#57534e', 500: '#78716c', 400: '#a8a29e', 300: '#d6d3d1', 200: '#e7e5e4', 100: '#f5f5f4', 50: '#fafaf9' } } } }
};
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Inter,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif}
  .gradient-bg{background:radial-gradient(circle at top left,rgba(255,255,255,0.92),rgba(245,239,231,0.96) 42%,rgba(240,235,227,0.99) 100%)}
  .dark .gradient-bg{background:radial-gradient(circle at top left,rgba(55,48,43,0.72),rgba(28,25,23,0.98) 40%,rgba(12,10,9,1) 100%)}
  .nav-item{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:#a8a29e;text-decoration:none;transition:all 0.15s}
  .nav-item:hover{color:#44403c;background:rgba(0,0,0,0.04)}
  .dark .nav-item:hover{color:#e7e5e4;background:rgba(255,255,255,0.04)}
  .nav-item.active{color:#c2410c;background:rgba(194,65,12,0.08)}
  .dark .nav-item.active{color:#ea580c;background:rgba(234,88,12,0.12)}
  .card{background:#fff;border-radius:12px;border:1px solid #e7e5e4;padding:20px}
  .dark .card{background:#292524;border-color:#44403c}
  .stat-item{text-align:center;padding:12px;border-radius:8px}
  .stat-item:hover{background:rgba(0,0,0,0.02)}
  .dark .stat-item:hover{background:rgba(255,255,255,0.04)}
  .stat-value{font-size:24px;font-weight:700;color:#1c1917}
  .dark .stat-value{color:#e7e5e4}
  .stat-label{font-size:12px;color:#a8a29e;margin-top:2px}
  .progress-bar{width:100%;height:8px;border-radius:4px;overflow:hidden;background:#e7e5e4}
  .dark .progress-bar{background:#44403c}
  .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c2410c,#ea580c);transition:width 0.6s}
  .dark .progress-fill{background:linear-gradient(90deg,#ea580c,#f97316)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #e7e5e4;background:#fff;color:#44403c;transition:all 0.15s}
  .btn:hover{background:#f5f5f4}
  .dark .btn{background:#292524;border-color:#44403c;color:#e7e5e4}
  .dark .btn:hover{background:#44403c}
  .btn-primary{background:#c2410c;color:#fff;border-color:#c2410c}
  .btn-primary:hover{background:#9a3412}
  .dark .btn-primary{background:#ea580c;border-color:#ea580c;color:#fff}
  .dark .btn-primary:hover{background:#c2410c}
  .btn-success{background:#16a34a;color:#fff;border-color:#16a34a}
  .btn-success:hover{background:#15803d}
  .dark .btn-success{background:#22c55e;border-color:#22c55e;color:#000}
  .btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}
  .btn-danger:hover{background:#b91c1c}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .form-group{display:flex;flex-direction:column;gap:3px}
  .form-group label{font-size:12px;font-weight:600;color:#a8a29e;text-transform:uppercase;letter-spacing:0.05em}
  .form-group input,.form-group select{padding:8px 12px;border-radius:8px;border:1px solid #e7e5e4;font-size:14px;color:#44403c;background:#fff;outline:none;transition:all 0.15s}
  .form-group input:focus,.form-group select:focus{border-color:#c2410c;box-shadow:0 0 0 2px rgba(194,65,12,0.12)}
  .dark .form-group input,.dark .form-group select{background:#44403c;border-color:#57534e;color:#e7e5e4}
  .dark .form-group input:focus,.dark .form-group select:focus{border-color:#ea580c;box-shadow:0 0 0 2px rgba(234,88,12,0.2)}
  .logs-area{height:280px;overflow-y:auto;border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;border:1px solid #e7e5e4;background:#fafaf9}
  .dark .logs-area{background:rgba(0,0,0,0.25);border-color:#44403c}
  .log-entry{padding:2px 4px;border-radius:2px}
  .log-green{color:#16a34a}.dark .log-green{color:#22c55e}
  .log-red{color:#dc2626}.dark .log-red{color:#ef4444}
  .log-yellow{color:#ca8a04}.dark .log-yellow{color:#eab308}
  .toggle{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d6d3d1;border-radius:24px;transition:0.2s}
  .toggle .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.2s}
  .toggle input:checked+.slider{background:#16a34a}
  .toggle input:checked+.slider:before{transform:translateX(20px)}
  input[type="password"]::-ms-reveal,input[type="password"]::-ms-clear{display:none}
  .spinner{width:18px;height:18px;border:2px solid #d6d3d1;border-top-color:#c2410c;border-radius:50%;animation:spin 0.5s linear infinite}
  .dark .spinner{border-color:#57534e;border-top-color:#ea580c}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:3px}
  .dark ::-webkit-scrollbar-thumb{background:#57534e}
</style>
</head>
<body class="gradient-bg text-stone-700 dark:text-stone-200 antialiased min-h-screen">
<div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-2 sm:py-4 flex flex-col gap-3 sm:gap-5 min-h-screen">

  <!-- TopNav -->
  <nav class="flex items-center gap-1 p-1 rounded-xl bg-white/70 dark:bg-black/[0.15] backdrop-blur-[12px] border border-stone-200 dark:border-stone-700 flex-wrap shadow-sm">
    <a href="/" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>概览</a>
    <a href="/accounts" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6"/><path d="M23 11h-6"/></svg>账号</a>
    <a href="/settings" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置</a>
    <a href="/register" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>注册</a>
  </nav>

  <!-- Stats Card -->
  <div class="card">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-base font-semibold text-stone-800 dark:text-stone-200">注册任务</h2>
      <div class="flex items-center gap-2">
        <label class="toggle"><input type="checkbox" id="toggle-enable" onchange="toggleEnabled()"><span class="slider"></span></label>
        <span id="status-text" class="text-xs text-stone-400 font-medium">加载中...</span>
      </div>
    </div>
    <div class="grid grid-cols-4 sm:grid-cols-8 gap-3">
      <div class="stat-item"><div class="stat-value" id="stat-success">-</div><div class="stat-label">成功</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-fail">-</div><div class="stat-label">失败</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-done">-</div><div class="stat-label">已完成</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-total">-</div><div class="stat-label">目标</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-running">-</div><div class="stat-label">进行中</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-rate">-</div><div class="stat-label">成功率</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-available">-</div><div class="stat-label">可用账号</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-quota">-</div><div class="stat-label">总额度</div></div>
    </div>
    <div id="progress-wrapper" class="mt-4 hidden"><div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div></div>
  </div>

  <!-- Config + Mail Side by Side -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div class="card">
      <h2 class="text-base font-semibold text-stone-800 dark:text-stone-200 mb-4">任务配置</h2>
      <div class="flex flex-wrap gap-3 mb-3">
        <div class="form-group flex-1 min-w-[100px]"><label>模式</label><select id="cfg-mode"><option value="total">总数模式</option><option value="quota">额度模式</option><option value="available">可用账号模式</option></select></div>
        <div class="form-group" style="width:90px"><label>目标</label><input type="number" id="cfg-total" min="1"></div>
        <div class="form-group" style="width:90px"><label>线程</label><input type="number" id="cfg-threads" min="1" max="20"></div>
      </div>
      <div class="flex flex-wrap gap-3 mb-3">
        <div class="form-group flex-1"><label>代理地址</label><input type="text" id="cfg-proxy" placeholder="http://proxy:7890"></div>
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-primary" id="btn-save" onclick="saveConfig()">💾 保存</button>
        <button class="btn btn-success" id="btn-start" onclick="startTask()">▶ 启动</button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopTask()">■ 停止</button>
        <button class="btn" onclick="resetTask()">↻ 重置</button>
      </div>
    </div>

    <div class="card">
      <h2 class="text-base font-semibold text-stone-800 dark:text-stone-200 mb-4">邮箱 API</h2>
      <div class="flex flex-wrap gap-3 mb-3">
        <div class="form-group flex-1 min-w-[200px]"><label>API 地址</label><input type="text" id="mail-api" placeholder="https://maliapi.example.com/v1"></div>
      </div>
      <div class="flex flex-wrap gap-3 mb-3">
        <div class="form-group flex-1"><label>API Key</label><input type="password" id="mail-key" placeholder="AC-xxxxx"></div>
      </div>
    </div>
  </div>

  <!-- Logs -->
  <div class="card">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base font-semibold text-stone-800 dark:text-stone-200">运行日志</h2>
      <button class="btn text-xs py-1 px-3" onclick="document.getElementById('logs').innerHTML='<div class=\\'text-stone-400 text-center py-8 text-sm\\'>等待数据...</div>'">清空</button>
    </div>
    <div class="logs-area" id="logs"><div class="text-stone-400 text-center py-8 text-sm">加载中...</div></div>
  </div>
</div>

<script>
const API = '/api/register';
let TOKEN = localStorage.getItem('chatgpt2api-token');

(async function(){
  if (!TOKEN) {
    TOKEN = prompt('请输入管理员密钥:');
    if (TOKEN) localStorage.setItem('chatgpt2api-token', TOKEN);
  }
  if (!TOKEN) return;
  try {
    const r = await fetch(API, { headers: { 'Authorization': 'Bearer ' + TOKEN } });
    const d = await r.json();
    updateUI(d.register);
  } catch(e) {
    document.getElementById('logs').innerHTML = '<div class="log-red text-center py-4">❌ 连接失败，请检查密钥或刷新页面</div>';
  }
  connectSSE();
})();

function $(id) { return document.getElementById(id); }

function escHtml(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateUI(reg) {
  if (!reg) return;
  const s = reg.stats || {};
  $('stat-success').textContent = s.success ?? '-';
  $('stat-fail').textContent = s.fail ?? '-';
  $('stat-done').textContent = s.done ?? '-';
  $('stat-total').textContent = reg.total ?? '-';
  $('stat-running').textContent = s.running ?? '0';
  $('stat-rate').textContent = (s.success_rate ?? 0) + '%';
  $('stat-available').textContent = s.current_available ?? '-';
  $('stat-quota').textContent = s.current_quota ?? '-';

  const enabled = reg.enabled === true;
  $('toggle-enable').checked = enabled;
  $('status-text').textContent = enabled ? '● 运行中' : '○ 已停止';
  $('btn-start').disabled = enabled;
  $('btn-stop').disabled = !enabled;

  const done = s.done || 0;
  const total = reg.total || 1;
  const pw = $('progress-wrapper');
  if (enabled || done > 0) {
    pw.classList.remove('hidden');
    $('progress-fill').style.width = Math.min(100, done * 100 / total) + '%';
  } else {
    pw.classList.add('hidden');
  }

  $('cfg-mode').value = reg.mode || 'total';
  $('cfg-total').value = reg.total || 2000;
  $('cfg-threads').value = reg.threads || 5;
  $('cfg-proxy').value = reg.proxy || '';

  const p = ((reg.mail || {}).providers || [])[0] || {};
  $('mail-api').value = p.api_base || 'https://maliapi.215.im/v1';
  $('mail-key').value = p.api_key || '';

  if (reg.logs && reg.logs.length) {
    const el = $('logs');
    el.innerHTML = reg.logs.slice(-200).map(l => {
      const c = l.level === 'green' ? 'log-green' : l.level === 'red' ? 'log-red' : l.level === 'yellow' ? 'log-yellow' : '';
      const t = (l.time || '').substring(11, 19);
      return '<div class="log-entry ' + c + '"><span class="text-stone-400">[' + t + ']</span> ' + escHtml(l.text) + '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  }
}

async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

async function saveConfig() {
  const body = {
    mode: $('cfg-mode').value,
    total: parseInt($('cfg-total').value) || 2000,
    threads: Math.min(20, Math.max(1, parseInt($('cfg-threads').value) || 5)),
    proxy: $('cfg-proxy').value || undefined,
    mail: {
      providers: [{
        enable: true, type: 'yyds_mail',
        api_base: $('mail-api').value || undefined,
        api_key: $('mail-key').value || undefined,
        domain: [], subdomain: '', email_prefix: '', wildcard: false
      }]
    }
  };
  const d = await apiPost('', body);
  updateUI(d.register);
}

async function startTask() { const d = await apiPost('/start'); updateUI(d.register); }
async function stopTask() { const d = await apiPost('/stop'); updateUI(d.register); }
async function resetTask() { if (!confirm('确定重置所有注册数据？')) return; const d = await apiPost('/reset'); updateUI(d.register); }

function toggleEnabled() {
  const cb = $('toggle-enable');
  if (cb.checked) startTask(); else stopTask();
}

let es = null;
function connectSSE() {
  if (es) es.close();
  // Use query param token for SSE (as the backend expects)
  es = new EventSource('/api/register/events?token=' + encodeURIComponent(TOKEN));
  es.onmessage = function(e) {
    try { updateUI(JSON.parse(e.data)); } catch(ex) {}
  };
  es.onerror = function() {
    setTimeout(connectSSE, 3000);
  };
}

// Sync theme with main app
(function(){
  try {
    const stored = localStorage.getItem('chatgpt2api-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light';
    document.documentElement.classList.toggle('dark', theme === 'dark');
  } catch(e) {}
})();
</script>
</body>
</html>
